name: flutter_boilerplate
description: "Flutter clean architecture boilerplate with TMDB API."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.1
  bloc: ^9.0.0

  # DI
  get_it: ^8.0.3

  # Functional error handling
  dartz: ^0.10.1

  # Routing
  go_router: ^16.0.0

  # Network
  http: ^1.4.0
  dio: ^5.8.0

  # Debug
  chucker_flutter: ^1.9.2

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2

  # Code gen annotations
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code generation
  build_runner: ^2.10.1
  freezed: ^3.2.3
  json_serializable: ^6.10.0

  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  http_mock_adapter: ^0.6.1

flutter:
  uses-material-design: true
